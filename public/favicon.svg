<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>Circle of Fifths – Fretboard Visualizer</title>


  <defs>
    <!--
      Full 30° donut segment: cos(15°)=0.96593 sin(15°)=0.25882
      Outer r=56: (54.09, ±14.49)   Inner r=26: (25.11, ±6.73)
    -->
    <path id="seg" d="M 54.09 -14.49 A 56 56 0 0 1 54.09 14.49 L 25.11 6.73 A 26 26 0 0 0 25.11 -6.73 Z"/>
    <clipPath id="gridClip">
      <rect x="40.7" y="52.4" width="46.6" height="23.2"/>
    </clipPath>
  </defs>

  <!-- 12 colored segments (full 30° each, one per note) -->
  <use href="#seg" transform="translate(64,64) rotate(-90)"  fill="hsl(200,68%,60%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(-60)"  fill="hsl(168,62%,56%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(-30)"  fill="hsl(140,60%,53%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(0)"    fill="hsl(88,60%,53%)"  stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(30)"   fill="hsl(56,68%,56%)"  stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(60)"   fill="hsl(34,70%,57%)"  stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(90)"   fill="hsl(14,70%,59%)"  stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(120)"  fill="hsl(350,66%,59%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(150)"  fill="hsl(322,64%,58%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(180)"  fill="hsl(290,62%,59%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(210)"  fill="hsl(258,64%,59%)" stroke="#0a0a0c" stroke-width="0.6"/>
  <use href="#seg" transform="translate(64,64) rotate(240)"  fill="hsl(224,66%,60%)" stroke="#0a0a0c" stroke-width="0.6"/>

  <!-- Separating rings -->
  <circle cx="64" cy="64" r="57" fill="none" stroke="#0a0a0c" stroke-width="1.5"/>
  <circle cx="64" cy="64" r="25" fill="none" stroke="#0a0a0c" stroke-width="1.5"/>

  <g clip-path="url(#gridClip)">
    <!-- Row 1: F  F#  G  G#  A -->
    <rect x="40.7" y="52.4" width="9.3" height="7.7" fill="hsl(224,66%,60%)"/>
    <rect x="50.0" y="52.4" width="9.3" height="7.7" fill="hsl(14,70%,59%)"/>
    <rect x="59.3" y="52.4" width="9.3" height="7.7" fill="hsl(168,62%,56%)"/>
    <rect x="68.6" y="52.4" width="9.3" height="7.7" fill="hsl(322,64%,58%)"/>
    <rect x="77.9" y="52.4" width="9.3" height="7.7" fill="hsl(88,60%,53%)"/>
    <!-- Row 2: C  C#  D  D#  E -->
    <rect x="40.7" y="60.1" width="9.3" height="7.7" fill="hsl(200,68%,60%)"/>
    <rect x="50.0" y="60.1" width="9.3" height="7.7" fill="hsl(350,66%,59%)"/>
    <rect x="59.3" y="60.1" width="9.3" height="7.7" fill="hsl(140,60%,53%)"/>
    <rect x="68.6" y="60.1" width="9.3" height="7.7" fill="hsl(290,62%,59%)"/>
    <rect x="77.9" y="60.1" width="9.3" height="7.7" fill="hsl(56,68%,56%)"/>
    <!-- Row 3: G  G#  A  A#  B -->
    <rect x="40.7" y="67.8" width="9.3" height="7.7" fill="hsl(168,62%,56%)"/>
    <rect x="50.0" y="67.8" width="9.3" height="7.7" fill="hsl(322,64%,58%)"/>
    <rect x="59.3" y="67.8" width="9.3" height="7.7" fill="hsl(88,60%,53%)"/>
    <rect x="68.6" y="67.8" width="9.3" height="7.7" fill="hsl(258,64%,59%)"/>
    <rect x="77.9" y="67.8" width="9.3" height="7.7" fill="hsl(34,70%,57%)"/>
    <!-- Grid dividers -->
    <line x1="40.7" y1="60.1" x2="87.3" y2="60.1" stroke="#0a0a0c" stroke-width="0.8"/>
    <line x1="40.7" y1="67.8" x2="87.3" y2="67.8" stroke="#0a0a0c" stroke-width="0.8"/>
    <line x1="50.0" y1="52.4" x2="50.0" y2="75.6" stroke="#0a0a0c" stroke-width="0.8"/>
    <line x1="59.3" y1="52.4" x2="59.3" y2="75.6" stroke="#0a0a0c" stroke-width="0.8"/>
    <line x1="68.6" y1="52.4" x2="68.6" y2="75.6" stroke="#0a0a0c" stroke-width="0.8"/>
    <line x1="77.9" y1="52.4" x2="77.9" y2="75.6" stroke="#0a0a0c" stroke-width="0.8"/>
  </g>
</svg>
