<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>Fretboard Visualizer</title>
  <circle cx="64" cy="64" r="60" fill="#0b0b0b" />
  <circle cx="64" cy="64" r="56" fill="none" stroke="#ffffff" stroke-opacity="0.14" stroke-width="4" />

  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
    <!-- Guitar body -->
    <circle cx="56" cy="80" r="20" />
    <circle cx="62" cy="58" r="14" />

    <!-- Neck + head -->
    <rect x="66" y="28" width="10" height="28" rx="4" />
    <rect x="63" y="14" width="16" height="14" rx="4" />

    <!-- Sound hole -->
    <circle cx="56" cy="78" r="6" stroke-width="5" />

    <!-- Simple strings -->
    <path d="M68 28 L68 58" stroke-width="3" stroke-opacity="0.9" />
    <path d="M74 28 L74 58" stroke-width="3" stroke-opacity="0.9" />

    <!-- Tuning pegs -->
    <path d="M63 18 L57 18" stroke-width="4" />
    <path d="M79 18 L85 18" stroke-width="4" />
  </g>
</svg>
