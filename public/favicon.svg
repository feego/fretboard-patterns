<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <title>Circle of Fifths – Fretboard Visualizer</title>

  <defs>
    <path id="seg" d="M 51.19,-13.71 Q 54.09,-14.49 54.87,-11.59 A 56 56 0 0 1 54.87,11.59 Q 54.09,14.49 51.19,13.71 L 28.01,7.51 Q 25.11,6.73 25.89,3.83 A 26 26 0 0 0 25.89,-3.83 Q 25.11,-6.73 28.01,-7.51 Z"/>
    <clipPath id="gridClip">
      <rect x="0" y="40.8" width="128" height="46.4"/>
    </clipPath>
    <clipPath id="iconClip">
      <rect width="128" height="128" rx="22"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
  <g clip-path="url(#gridClip)">
    <!-- Dark background so gaps between cells show as dark gutters -->
    <rect x="0" y="40.8" width="128" height="46.4" fill="#0a0a0c"/>
    <!-- Row 1 (1px gutters around each cell) -->
    <rect x="1"     y="41.8" width="23.6" height="13.4" rx="3" fill="hsl(224,66%,60%)"/>
    <rect x="26.6"  y="41.8" width="23.6" height="13.4" rx="3" fill="hsl(14,70%,59%)"/>
    <rect x="52.2"  y="41.8" width="23.6" height="13.4" rx="3" fill="hsl(168,62%,56%)"/>
    <rect x="77.8"  y="41.8" width="23.6" height="13.4" rx="3" fill="hsl(322,64%,58%)"/>
    <rect x="103.4" y="41.8" width="23.6" height="13.4" rx="3" fill="hsl(88,60%,53%)"/>
    <!-- Row 2 -->
    <rect x="1"     y="57.2" width="23.6" height="13.4" rx="3" fill="hsl(200,68%,60%)"/>
    <rect x="26.6"  y="57.2" width="23.6" height="13.4" rx="3" fill="hsl(350,66%,59%)"/>
    <rect x="52.2"  y="57.2" width="23.6" height="13.4" rx="3" fill="hsl(140,60%,53%)"/>
    <rect x="77.8"  y="57.2" width="23.6" height="13.4" rx="3" fill="hsl(290,62%,59%)"/>
    <rect x="103.4" y="57.2" width="23.6" height="13.4" rx="3" fill="hsl(56,68%,56%)"/>
    <!-- Row 3 -->
    <rect x="1"     y="72.6" width="23.6" height="13.4" rx="3" fill="hsl(168,62%,56%)"/>
    <rect x="26.6"  y="72.6" width="23.6" height="13.4" rx="3" fill="hsl(322,64%,58%)"/>
    <rect x="52.2"  y="72.6" width="23.6" height="13.4" rx="3" fill="hsl(88,60%,53%)"/>
    <rect x="77.8"  y="72.6" width="23.6" height="13.4" rx="3" fill="hsl(258,64%,59%)"/>
    <rect x="103.4" y="72.6" width="23.6" height="13.4" rx="3" fill="hsl(34,70%,57%)"/>
  </g>

  <!-- 12 colored segments (strokes restored) -->
  <use href="#seg" transform="translate(64,64) rotate(-90)"  fill="hsl(200,68%,60%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(-60)"  fill="hsl(168,62%,56%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(-30)"  fill="hsl(140,60%,53%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(0)"    fill="hsl(88,60%,53%)"  stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(30)"   fill="hsl(56,68%,56%)"  stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(60)"   fill="hsl(34,70%,57%)"  stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(90)"   fill="hsl(14,70%,59%)"  stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(120)"  fill="hsl(350,66%,59%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(150)"  fill="hsl(322,64%,58%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(180)"  fill="hsl(290,62%,59%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(210)"  fill="hsl(258,64%,59%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  <use href="#seg" transform="translate(64,64) rotate(240)"  fill="hsl(224,66%,60%)" stroke="#0a0a0c" stroke-width="2.4" stroke-linejoin="round"/>
  </g>
</svg>

